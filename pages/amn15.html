  <style>
    :root {
      --discord-blurple: #5865F2;
      --discord-blurple-hover: #4752C4;
      --gold: #c9a227;
      --gold-light: #f0cb52;
      --navy: #05091e;
      --navy-card: rgba(10, 18, 50, 0.45);
      --border-gold: rgba(201, 162, 39, 0.18);
    }

    body {
      font-family: 'Tajawal', 'Cairo', sans-serif;
      background: radial-gradient(circle at 50% 0%, #0c163b 0%, #05091e 80%);
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .profile-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
      width: 100%;
    }

    /* ── HEADER CARD (BANNER & AVATAR) ── */
    .profile-header-card {
      position: relative;
      background: var(--navy-card);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border-gold);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      margin-bottom: 30px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .profile-banner-wrap {
      height: 200px;
      width: 100%;
      position: relative;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid rgba(201, 162, 39, 0.12);
      filter: none !important;
      backdrop-filter: none !important;
    }

    .profile-avatar-row {
      padding: 0 35px 25px;
      display: flex;
      align-items: flex-end;
      gap: 25px;
      margin-top: -60px;
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--gold);
      background: #05091e;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    .profile-meta {
      flex: 1;
      min-width: 250px;
      padding-bottom: 10px;
    }

    .profile-name {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile-tag {
      font-size: 0.95rem;
      color: var(--gold-light);
      font-family: monospace;
      font-weight: 700;
    }

    .profile-badge-rank {
      background: linear-gradient(135deg, var(--gold), #3465b0);
      color: #05091e;
      font-size: 10px;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 6px;
      display: inline-block;
    }

    /* ── DETAILS GRID ── */
    .profile-details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      padding: 25px 35px 35px;
      background: rgba(5, 9, 30, 0.4);
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .profile-detail-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }

    .profile-detail-lbl {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      font-weight: bold;
    }

    .profile-detail-val {
      font-size: 0.95rem;
      color: #fff;
      font-weight: 800;
    }

    /* ── TABS ── */
    .profile-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(201, 162, 39, 0.15);
      padding-bottom: 12px;
    }

    .p-tab-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-family: inherit;
    }
    .p-tab-btn:hover {
      background: rgba(92, 146, 232, 0.08);
      border-color: rgba(92, 146, 232, 0.3);
      color: #fff;
    }
    .p-tab-btn.active {
      background: linear-gradient(135deg, var(--gold), #3465b0);
      border-color: var(--gold);
      color: #05091e;
      box-shadow: 0 4px 15px rgba(92, 146, 232, 0.2);
    }

    .p-tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .p-tab-content.active {
      display: block;
    }

    /* Fines & Promo styling */
    .fine-card {
      background: rgba(255, 71, 87, 0.04);
      border: 1px solid rgba(255, 71, 87, 0.15);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      position: relative;
    }
    .fine-card-badge {
      position: absolute;
      top: 15px; left: 15px;
      font-size: 0.72rem;
      background: rgba(255, 71, 87, 0.15);
      color: #ff4757;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: bold;

    .fine-card-amount {

      font-weight: 900;
      color: #ff4757;
      margin-bottom: 12px;
    }
    .fine-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .fine-card-lbl {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2px;
    }
    .fine-card-val {
      font-size: 0.85rem;
      color: #fff;
      font-weight: bold;
    }

    /* Warning card */
    .warning-card {
      background: rgba(201, 162, 39, 0.05);
      border: 1px solid var(--border-gold);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 550px;
      margin: 60px auto;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── SKELETON LOADER STYLES ── */
    .skeleton-banner {
      height: 200px;
      width: 100%;
    }
    .skeleton-avatar {
      width: 120px;

    .skeleton-title {

    .skeleton-tag {

    .skeleton-label {

      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 10px;

      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
  </style>

  function resolveImageUrl(url) {
    if (!url) return '';
    if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('data:')) {
      return url;
    }
    if (url.startsWith('uploads/') || url.startsWith('assets/')) {
      const isPages = window.location.pathname.includes('/pages/');
      return isPages ? '../' + url : url;
    }
    return url;
  }

  let discordUsersCache = {};

  async function loadDiscordUsersCache() {
    try {
      const res = await fetch(`/api/auth/discord_users_cache?t=${Date.now()}`);
      if (res.ok) {
        discordUsersCache = await res.json();
        console.log('[Discord Cache] Loaded Discord profiles cache from API successfully!');
      } else {
        const fallbackRes = await fetch(`../assets/data/discord_users.json?t=${Date.now()}`);
        if (fallbackRes.ok) {
          discordUsersCache = await fallbackRes.json();
          console.log('[Discord Cache] Loaded Discord profiles cache from static fallback successfully!');
        }
      }
    } catch (err) {
      console.warn('[Discord Cache] Failed to load Discord users cache:', err);
    }
  }

  window.refreshDiscordProfile = async function(discordId) {
    const btn = document.getElementById('refresh-discord-btn');
    if (!btn) return;
    
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-arrows-rotate fa-spin"></i> جاري التحديث...`;
    btn.style.opacity = '0.7';
    btn.style.cursor = 'not-allowed';

    try {
      const res = await fetch('/api/auth/refresh_discord_profile', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ discord_id: discordId })
      });

      if (res.status === 404) {
        throw new Error('لم يتم تفعيل المسار بعد (404). يرجى التأكد من إعادة تشغيل تطبيق الـ Node.js من لوحة تحكم استضافة هوستنجر (Hostinger) لتفعيل التحديثات الجديدة.');
      }

      const contentType = res.headers.get('content-type');
      if (!contentType || !contentType.includes('application/json')) {
        throw new Error('الخادم أرجع استجابة غير صالحة (ليست JSON). يرجى إعادة تشغيل السيرفر من لوحة تحكم هوستنجر.');
      }

      const data = await res.json();
      if (res.ok && data.success) {
        await App.alert('تم تحديث صورتك وبنرك الشخصي من ديسكورد بنجاح! سيتم إعادة تحميل الصفحة لعرض التغييرات.', 'تم التحديث بنجاح');
        window.location.reload();
      } else {
        throw new Error(data.error || 'حدث خطأ غير متوقع أثناء تحديث البيانات.');
      }
    } catch (err) {
      console.error(err);
      App.alert('فشل التحديث: ' + err.message, 'خطأ في التحديث');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    }
  };

  function renderProfile() {
    const container = document.getElementById('profile-container-inner');
    
    // Resolve user from URL parameters
    const params = new URLSearchParams(window.location.search);
    const qName = params.get('name');
    const qBadge = params.get('badge');
    const qDiscord = params.get('discord');

    const allUsers = Storage.getCollection(Storage.keys.USERS) || [];
    const dbRows = Storage.getCollection(Storage.keys.DATABASE_ROWS) || [];

    let targetUser = null;

    // Helper: search in Google Sheets cache
    let sheets = {};
    try {
      const cachedData = localStorage.getItem('members_google_sheets_cache');
      if (cachedData) {
        sheets = JSON.parse(cachedData);
      }
    } catch (e) {
      console.error('Failed to parse sheets cache in profile:', e);
    }

    function findInSheets(query, type) {
      if (!sheets) return null;
      const cleanStr = (s) => String(s || '').trim().toLowerCase();
      const qClean = cleanStr(query).replace('@', '');
      
      const mainTabs = [
        'جدول الامن العام - الاساسي',
        'جدول الامن العام - المنتدبين',
        'جدول الامن العام - الادارة'
      ];

      // First pass: Check main tabs
      for (const tabName of mainTabs) {
        if (!sheets[tabName]) continue;
        const rows = sheets[tabName] || [];
        const matched = rows.find(r => {
          if (type === 'name' && cleanStr(r.name) === cleanStr(query)) return true;

      </div>

      <!-- Reqs Tab Content -->
      <div id="p-tab-content-reqs" class="p-tab-content" style="margin-top: 20px; display: none;">
      </div>
    `;

    // Initialize promotion calculation logic variables
    const rawNormalized = (user.rank || '').replace(/\s*ركن\s*/g, '').trim();
    const normalizedRank = cleanArabicString(rawNormalized);

    // Cross-reference which sheets table has the user to detect mutandib status
    let matchedTabName = '';
    for (const tabName in sheets) {
      if (tabName === ' جدول الغرامات 💵') continue;
      const found = sheets[tabName].some(r => r.name === user.name || (r.badge && r.badge === user.badge));
      if (found) {
        matchedTabName = tabName;
        break;
      }
    }
    const isMutandibUser = matchedTabName === 'جدول الامن العام - المنتدبين';
    const baseReqsTable = isMutandibUser ? PROMO_REQS_MUTANDIB : PROMO_REQS_AFRAD;

    // Check if both systems exist for this rank (only Afrad can have Speed/exceptional promos)
    const hasRegular = baseReqsTable[rawNormalized] !== undefined || baseReqsTable[user.rank] !== undefined;
    const hasSpeed = !isMutandibUser && (PROMO_REQS_SPEED[rawNormalized] !== undefined || PROMO_REQS_SPEED[user.rank] !== undefined);

    let currentProfilePromoType = 'regular';

    function renderPromoRequirements() {
      const reqsTabEl = document.getElementById('p-tab-content-reqs');
      if (!reqsTabEl) return;

      let reqsTable = baseReqsTable;
      if (currentProfilePromoType === 'speed' && hasSpeed) {
        reqsTable = PROMO_REQS_SPEED;
      }

      let reqs = null;
      let currentRankIndex = -1;
      const rankKeys = Object.keys(reqsTable);
      for (let i = 0; i < rankKeys.length; i++) {
        if (cleanArabicString(rankKeys[i]) === normalizedRank) {
          reqs = reqsTable[rankKeys[i]];
          currentRankIndex = i;
          break;
        }
      }

      if (!reqs) {
        reqsTabEl.innerHTML = `
          <div style="text-align:center; padding:50px 20px; color:rgba(255,255,255,0.3); font-size:0.9rem;">
            <i class="fa-solid fa-medal"></i> لا توجد متطلبات ترقية متاحة لهذه الرتبة حالياً<br>
            <span style="font-size:0.75rem; opacity:0.6">ربما وصلت لأعلى رتبة أو الرتبة غير مسجلة</span>
          </div>`;
        return;
      }

      // Parse date and calculate diffDays
      let diffDays = 0;
      const pDateStr = (user.joinDate || '').trim();
      if (pDateStr && pDateStr !== '-' && pDateStr !== '—' && pDateStr !== '') {
        try {
          let pDate = null;
          if (/^\d{4,6}$/.test(pDateStr)) {
            pDate = new Date(Date.UTC(1899, 11, 30) + parseInt(pDateStr) * 86400000);
          } else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(pDateStr)) {
            const [d, m, y] = pDateStr.split('/');
            pDate = new Date(Date.UTC(+y, +m - 1, +d));
          } else if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(pDateStr)) {
            const clean = pDateStr.replace(/\//g, '-');
            pDate = new Date(clean + (clean.length === 10 ? 'T00:00:00Z' : ''));
          } else if (/^\d{1,2}-\d{1,2}-\d{4}$/.test(pDateStr)) {
            const [d, m, y] = pDateStr.split('-');
            pDate = new Date(Date.UTC(+y, +m - 1, +d));
          } else {
            pDate = new Date(pDateStr);
          }

          if (pDate && !isNaN(pDate.getTime())) {
            const todayUTC = Date.UTC(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
            diffDays = Math.max(0, Math.round((todayUTC - pDate.getTime()) / 86400000));
          }
        } catch (e) { console.warn('Date parse error:', pDateStr, e); }
      }

      const fillPct = Math.min(100, Math.round((diffDays / reqs.days) * 100));
      const daysOk  = diffDays >= reqs.days;
      const barColor = daysOk ? 'linear-gradient(90deg,#2ecc71,#27ae60)' : 'linear-gradient(90deg,#e67e22,#d35400)';

      // Build required courses list
      const requiredCoursesList = [];
      if (reqs.courses && reqs.courses.length > 0) {
        reqs.courses.forEach(c => requiredCoursesList.push({ name: c, rankName: rankKeys[currentRankIndex], isCurrentRank: true }));
      }
      for (let i = 0; i < currentRankIndex; i++) {
        const prevRankKey = rankKeys[i];
        const prevReqs = reqsTable[prevRankKey];
        if (prevReqs && prevReqs.courses && prevReqs.courses.length > 0) {
          prevReqs.courses.forEach(c => {
            if (!requiredCoursesList.some(item => item.name === c)) {
              requiredCoursesList.push({ name: c, rankName: prevRankKey, isCurrentRank: false });
            }
          });
        }
      }

      const completedCourses = user.regularCourses || [];
      const coursesHTML = requiredCoursesList.length > 0
        ? requiredCoursesList.map(item => {
            const done = completedCourses.includes(item.name);
            if (!item.isCurrentRank && done) return null;
            const rankLabel = item.isCurrentRank ? 'الرتبة الحالية' : `الرتبة السابقة (${item.rankName})`;
            return `<div class="promo-condition-item" style="${done ? 'border-color:rgba(46,204,113,0.2);background:rgba(46,204,113,0.03)' : ''}">
              <div>
                <div style="font-weight:700;font-size:0.85rem;color:#fff"><i class="fa-solid fa-graduation-cap"></i> دورة: ${item.name}</div>
                <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:2px">دورة مطلوبة لـ: ${rankLabel}</div>
              </div>
              <span class="promo-status-badge" style="background:${done ? 'rgba(46,204,113,0.12)' : 'rgba(230,126,34,0.12)'}; color:${done ? '#2ecc71' : '#e67e22'}; border: 1px solid ${done ? 'rgba(46,204,113,0.25)' : 'rgba(230,126,34,0.25)'};">${done ? '✓ مكتملة' : '⏳ لم تكتمل'}</span>
            </div>`;
          }).filter(h => h !== null).join('')
        : '';

      const noteHTML = reqs.note
        ? `<div class="promo-condition-item" style="border-color:rgba(52,152,219,0.25);background:rgba(52,152,219,0.04)">
            <div>
              <div style="font-weight:700;font-size:0.85rem;color:#fff"><i class="fa-solid fa-landmark"></i> ${reqs.note}</div>
            </div>
            <span class="promo-status-badge warning" style="background:rgba(230,126,34,0.12); color:#e67e22; border: 1px solid rgba(230,126,34,0.25);">⏳ مطلوب</span>
          </div>`
        : '';

      const reportsHTML = reqs.reports
        ? `<div class="promo-condition-item">
            <div>
              <div style="font-weight:700;font-size:0.85rem;color:#fff">📋 ${reqs.reports} ${reqs.repType}</div>
              <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:2px">عدد التقارير المطلوبة</div>
            </div>
            <span class="promo-status-badge warning" style="background:rgba(230,126,34,0.12); color:#e67e22; border: 1px solid rgba(230,126,34,0.25);">⏳ تحقق مع القيادة</span>
          </div>`
        : '';

      // Selector HTML (only shown if both promo paths exist)
      let selectorHTML = '';
      if (hasRegular && hasSpeed) {
        selectorHTML = `
          <div class="promo-type-selector" style="display: flex; gap: 8px; margin-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; justify-content: center; width: 100%;">
            <button class="promo-type-btn" onclick="window.switchProfilePromoType('regular')" style="flex: 1; background: ${currentProfilePromoType === 'regular' ? 'linear-gradient(135deg, var(--gold), #3465b0)' : 'rgba(255,255,255,0.02)'}; border: 1px solid ${currentProfilePromoType === 'regular' ? 'var(--gold)' : 'rgba(255,255,255,0.1)'}; color: ${currentProfilePromoType === 'regular' ? '#05091e' : 'rgba(255,255,255,0.7)'}; padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-family: inherit;">أساسية</button>
            <button class="promo-type-btn" onclick="window.switchProfilePromoType('speed')" style="flex: 1; background: ${currentProfilePromoType === 'speed' ? 'linear-gradient(135deg, var(--gold), #3465b0)' : 'rgba(255,255,255,0.02)'}; border: 1px solid ${currentProfilePromoType === 'speed' ? 'var(--gold)' : 'rgba(255,255,255,0.1)'}; color: ${currentProfilePromoType === 'speed' ? '#05091e' : 'rgba(255,255,255,0.7)'}; padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-family: inherit;">استثنائية (مسرعة)</button>
          </div>
        `;
      }

      const promoTypeLabel = currentProfilePromoType === 'speed' ? 'استثنائية' : 'أساسية';

      reqsTabEl.innerHTML = `
        ${selectorHTML}

        <!-- الرتبة الحالية → التالية -->
        <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;
                    padding:14px 18px;background:rgba(201,162,39,0.05);border:1px solid rgba(201,162,39,0.15);border-radius:12px;">
          <div style="text-align:center;">
            <div style="font-size:0.68rem;color:rgba(255,255,255,0.4);margin-bottom:4px;">الرتبة الحالية</div>
            <div style="font-weight:900;color:var(--gold-light);font-size:0.95rem;">${user.rank || '—'}</div>
          </div>
          <div style="font-size:1.5rem;color:var(--gold-light);">&#8592;</div>
          <div style="text-align:center;">
            <div style="font-size:0.68rem;color:rgba(255,255,255,0.4);margin-bottom:4px;">الرتبة التالية (${promoTypeLabel})</div>
            <div style="font-weight:900;color:#2ecc71;font-size:0.95rem;">${reqs.to}</div>
          </div>
        </div>

        <!-- شريط تقدم الأيام -->
        <div class="promo-card">
          <div class="promo-days-row">
            <span style="font-weight:800;font-size:0.9rem;color:#fff"><i class="fa-solid fa-calendar-days"></i> المدة منذ آخر ترقية</span>
            <span class="promo-days-val" style="color:${daysOk ? '#2ecc71' : '#e67e22'}">${diffDays} / ${reqs.days} يوم</span>
          </div>
          <div class="promo-bar-bg">
            <div class="promo-bar-fill" style="width:${fillPct}%;background:${barColor};"></div>
          </div>
          <div style="font-size:0.78rem;font-weight:700;color:${daysOk ? '#2ecc71' : '#e67e22'};">
            ${daysOk ? `✓ أكملت المدة + ${diffDays - reqs.days} يوم إضافي` : `⏳ تبقى ${reqs.days - diffDays} يوم للاستحقاق`}
          </div>
        </div>

        <h4 style="font-weight:800;color:#fff;margin-bottom:12px;font-size:0.88rem">📋 متطلبات الترقية الرسمية (${promoTypeLabel})</h4>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          <!-- الساعات -->
          <div class="promo-condition-item">
            <div>
              <div style="font-weight:700;font-size:0.85rem;color:#fff">⏱️ ${reqs.hours} ساعة عمل</div>
              <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:2px">عدد الساعات المطلوبة للترقية</div>
            </div>
            <span class="promo-status-badge warning" style="background:rgba(230,126,34,0.12); color:#e67e22; border: 1px solid rgba(230,126,34,0.25);">⏳ تحقق مع القيادة</span>
          </div>

          ${reportsHTML}
          ${coursesHTML}
          ${noteHTML}
        </div>
      `;
    }

    window.switchProfilePromoType = function(type) {
      currentProfilePromoType = type;
      renderPromoRequirements();
    };

    window.switchProfileTab = function(tabName) {
      document.querySelectorAll('.p-tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelectorAll('.p-tab-content').forEach(content => {
        content.style.display = 'none';
      });

      const activeBtn = document.getElementById('btn-p-tab-' + tabName);
      if (activeBtn) {
        activeBtn.classList.add('active');
      }
      const activeContent = document.getElementById('p-tab-content-' + tabName);
      if (activeContent) {
        activeContent.style.display = 'block';
      }

      if (tabName === 'reqs') {
        renderPromoRequirements();
      }
    };
  }

</script>
</body>
</html>
