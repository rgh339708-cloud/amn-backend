  <link rel="stylesheet" href="../assets/css/main.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/navbar.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/footer.css">
  <style>
    .vehicles-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.7);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.88rem;
    }
    .tab-btn.active {
      border: 1px solid rgba(201,162,39,0.3);
      background: rgba(201,162,39,0.1);
      color: var(--color-gold-primary);
    }
    .vehicles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .vehicle-card {
      background: var(--color-bg-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }
    .vehicle-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,162,39,0.3);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }
    .vehicle-card-img-wrap {
      height: 210px;
      overflow: hidden;
      border-bottom: 1.5px solid rgba(201,162,39,0.15);
    }
    .vehicle-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .vehicle-card:hover .vehicle-card-img-wrap img {
      transform: scale(1.05);
    }
    .vehicle-card-body {
      padding: 22px;
      text-align: center;
    }
    .vehicle-badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .vehicle-badge-type {
      font-size: 0.7rem;
      font-weight: 900;
      background: rgba(201,162,39,0.08);
      color: var(--color-gold-primary);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(201,162,39,0.22);
      white-space: nowrap;
    }
    .vehicle-badge-rank {
      font-size: 0.7rem;
      font-weight: 900;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.85);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    .vehicle-title {
      font-size: 1.15rem;
      font-weight: 850;
      color: #fff;
      margin-bottom: 0;
      line-height: 1.4;
    }
  </style>
</head>

        <div class="vehicle-card animate-on-scroll">
          <div class="vehicle-card-img-wrap">
            <img src="${v.image}" alt="${v.model}">
          </div>
          <div class="vehicle-card-body">
            <div class="vehicle-badges">
              <span class="vehicle-badge-type">${v.typeText}</span>
              <span class="vehicle-badge-rank">${v.rankText}</span>
            </div>
            <h3 class="vehicle-title">${v.model}</h3>
          </div>
        </div>
      `).join('');
    }

    // Tabs Navigation Handler
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.getAttribute('data-tab');
        renderGrid(tab);
      });
    });

    // Initial render
    renderGrid('all');
  });
</script>
</body>
</html>
