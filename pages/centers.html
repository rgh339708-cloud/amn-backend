<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المراكز | الأمن العام</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/navbar.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=1.0.5">
  <link rel="stylesheet" href="../assets/css/footer.css">
  <style>
    .centers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .center-card {
      background: var(--color-bg-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .center-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,162,39,0.3);
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }
    .center-card-header {
      background: linear-gradient(135deg, rgba(13,27,75,0.8), rgba(7,18,48,0.9));
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(201,162,39,0.1);
      text-align: center;
    }
    .center-emoji {
      font-size: 3.5rem;
      margin-bottom: 12px;
      display: block;
    }
    .center-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .center-location {
      font-size: 0.8rem;
      color: var(--color-gold-primary);
      font-weight: 600;
    }
    .center-card-body {
      padding: 20px 24px;
    }
    .center-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .center-info-row:last-child { border-bottom: none; }
    .center-info-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
    }
    .center-info-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
    }
    .center-status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .center-status-badge.active {
      background: rgba(39,174,96,0.15);
      color: #2ecc71;
      border: 1px solid rgba(39,174,96,0.3);
    }
    .center-staff-count {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(201,162,39,0.06);
      border-radius: 10px;
      border: 1px solid rgba(201,162,39,0.12);
    }
    .center-staff-count .num {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--color-gold-primary);
    }
    .center-staff-count .lbl {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<script src="../assets/js/storage.js?v=1.0.5"></script>
<script src="../assets/js/data.js?v=1.0.5"></script>
<script src="../assets/js/auth.js?v=1.0.5"></script>
<script src="../assets/js/components.js"></script>
<script src="../assets/js/app.js?v=1.0.5"></script>

<script>
  document.write(Components.navbar('centers'));
  document.write(Components.sidebar('centers'));
</script>

<main class="page-content">
  <div class="page-header">
    <div class="page-header-bg"></div>
    <div class="container">
      <div class="page-header-badge animate-fade-in"><i class="fa-solid fa-building-shield"></i> المراكز الأمنية</div>
      <h1 class="page-header-title animate-fade-up"><span class="gradient-text">المراكز</span></h1>
      <p class="page-header-desc animate-fade-up delay-1">جميع مراكز الأمن العام وأقسامها ومواقعها وقادتها</p>
    </div>
  </div>

  <div class="container page-wrapper">
    <div class="centers-grid" id="centers-grid">
      <!-- JS populated -->
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    SeedData.init();

    const footerDiv = document.createElement('div');
    footerDiv.innerHTML = Components.footer();
    document.body.appendChild(footerDiv.firstElementChild);

    const centers = Storage.getCollection(Storage.keys.CENTERS) || [];
    const grid = document.getElementById('centers-grid');

    if (!centers.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon"><i class="fa-solid fa-building-shield"></i></div><div class="empty-state-title">لا توجد مراكز مسجلة</div></div>`;
      return;
    }

    grid.innerHTML = centers.map(c => `
      <div class="center-card animate-on-scroll">
        <div class="center-card-header" style="${c.image ? `background: linear-gradient(to bottom, rgba(5, 12, 38, 0.45) 0%, rgba(5, 12, 38, 0.9) 100%), url('${c.image}') no-repeat center center / cover; padding: 45px 24px 30px; border-bottom: 1.5px solid rgba(201,162,39,0.25);` : ''}">
          <img src="../assets/img/emblem.png" alt="شعار الأمن العام" style="width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.75)); margin-bottom: 12px; display: inline-block;">
          <div class="center-name" style="text-shadow: 0 2px 10px rgba(0,0,0,0.85);">${c.name}</div>
          <div class="center-location" style="text-shadow: 0 1px 5px rgba(0,0,0,0.85);"><i class="fa-solid fa-location-dot"></i> ${c.location}</div>
        </div>
        <div class="center-card-body" style="padding: 24px;">
          ${c.description ? `
          <p class="center-description" style="font-size: 0.88rem; color: rgba(255,255,255,0.75); line-height: 1.8; margin-bottom: 0; text-align: justify;">
            ${c.description}
          </p>
          ` : ''}
        </div>
      </div>
    `).join('');
  });
</script>
</body>
</html>
