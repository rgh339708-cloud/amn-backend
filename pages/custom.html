<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة مخصصة | الأمن العام</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=1.1.32">
  <link rel="stylesheet" href="../assets/css/navbar.css?v=1.1.32">
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=1.1.32">
  <link rel="stylesheet" href="../assets/css/footer.css">
  <style>
    .custom-page {
      background: var(--color-bg-primary);
      min-height: 100vh;
      padding-top: 102px; /* 62px top + 40px sub-nav */
    }
    .official-header {
      background: linear-gradient(180deg, #060d2e 0%, #0b1840 60%, #071230 100%);
      border-bottom: 1px solid rgba(201,162,39,0.15);
      padding: 40px 0 32px;
      position: relative;
      overflow: hidden;
    }
    .official-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, rgba(201,162,39,0.4) 20%, var(--color-gold-primary) 50%, rgba(201,162,39,0.4) 80%, transparent 100%);
    }
    .official-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(13,27,75,0.4) 0%, transparent 70%);
      pointer-events: none;
    }
    .official-header-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 var(--space-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-8);
      position: relative;
      z-index: 2;
    }
    .entity-name-block {
      text-align: right;
      flex: 1;
    }
    .entity-name-ar {
      font-size: 2rem;
      font-weight: 900;
      color: var(--color-text-primary);
      letter-spacing: 2px;
      line-height: 1.2;
    }
    .entity-name-en {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-gold-primary);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
      opacity: 0.85;
    }
    .official-emblem {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }
    .official-emblem-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(201,162,39,0.4));
    }
    .header-page-meta {
      text-align: left;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .page-meta-label {
      font-size: 9px;
      font-family: var(--font-display);
      color: var(--color-text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .page-meta-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--color-gold-light);
      letter-spacing: 1px;
    }
    .page-content-wrapper {
      max-width: var(--content-max);
      margin: 40px auto;
      padding: 0 var(--space-8) 60px;
    }
    .page-body-card {
      background: var(--color-bg-secondary);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
      line-height: 1.8;
      color: var(--color-text-secondary);
    }
    .page-body-card h1, .page-body-card h2, .page-body-card h3 {
      color: var(--color-text-primary);
      margin-bottom: var(--space-4);
      margin-top: var(--space-6);
    }
    .page-body-card p {
      margin-bottom: var(--space-4);
    }
    .error-card {
      text-align: center;
      padding: 60px var(--space-6);
    }
    .error-emoji {
      font-size: 4rem;
      margin-bottom: var(--space-4);
    }
    .error-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-gold-primary);
      margin-bottom: var(--space-2);
    }
    .error-desc {
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }
  </style>
</head>
<body>

<div id="toast-container"></div>

<script src="../assets/js/storage.js?v=1.1.32"></script>
<script src="../assets/js/data.js?v=1.1.32"></script>
<script src="../assets/js/auth.js?v=1.1.32"></script>
<script src="../assets/js/components.js?v=1.1.32"></script>
<script src="../assets/js/app.js?v=1.1.32"></script>

<script>
  // Get ID from URL query parameters
  const urlParams = new URLSearchParams(window.location.search);
  const pageId = urlParams.get('id');
  const pageData = pageId ? Storage.findById(Storage.keys.PAGES, pageId) : null;

  // Set active page for shell component
  const activePageToken = pageId ? `custom_${pageId}` : '';

  // Write navbar and sidebar
  document.write(Components.navbar(activePageToken));
  document.write(Components.sidebar(activePageToken));
</script>

<main class="custom-page">
  <div id="page-container">
    <!-- Will be filled dynamically -->
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Inject footer
    const footerDiv = document.createElement('div');
    footerDiv.innerHTML = Components.footer();
    document.body.appendChild(footerDiv.firstElementChild);

    SeedData.init();

    const container = document.getElementById('page-container');
    
    if (pageData) {
      const isPrivileged = Auth.isLoggedIn() && ['owner', 'assistant_owner', 'admin'].includes(Auth.getRole());
      if (pageData.isHidden && !isPrivileged) {
        document.title = `الصفحة مخفية | الأمن العام`;
        container.innerHTML = `
          <div class="page-content-wrapper" style="margin-top:100px">
            <div class="page-body-card error-card">
              <div class="error-emoji"><i class="fa-solid fa-eye"></i>‍🗨️</div>
              <div class="error-title">صفحة مخفية مؤقتاً</div>
              <div class="error-desc">عذراً، هذه الصفحة تم إخفاؤها مؤقتاً بواسطة الإدارة وليست متاحة للتصفح العام حالياً.</div>
              <a href="../index.html" class="btn btn-gold"><i class="fa-solid fa-house"></i> العودة للصفحة الرئيسية</a>
            </div>
          </div>
        `;
        return;
      }

      // Set Document Title
      document.title = `${pageData.title} | الأمن العام`;
      
      // Render Content
      container.innerHTML = `
        <header class="official-header">
          <div class="official-header-inner">
            <div class="entity-name-block">
              <div class="entity-name-ar">إدارة الأمن العام</div>
              <div class="entity-name-en">Public Security Administration</div>
            </div>
            
            <div class="official-emblem">
              <div class="emblem-img-wrap">
                <img src="../assets/img/emblem.png" alt="شعار الأمن العام" class="official-emblem-img">
              </div>
            </div>
            
            <div class="header-page-meta">
              <div class="page-meta-label">صفحة رسمية</div>
              <div class="page-meta-title">${pageData.emoji || '📄'} ${pageData.title}</div>
            </div>
          </div>
        </header>
        
        <div class="page-content-wrapper">
          <article class="page-body-card">
            ${pageData.content || '<p style="color:var(--color-text-muted);text-align:center">لا يوجد محتوى في هذه الصفحة.</p>'}
          </article>
          
          <div id="subpages-container"></div>
        </div>
      `;

      // Query sub-pages if there are any
      const allPages = Storage.getCollection(Storage.keys.PAGES);
      const subPages = allPages.filter(p => p.parentId === pageData.id);
      
      if (subPages.length > 0) {
        const subContainer = document.getElementById('subpages-container');
        if (subContainer) {
          subContainer.innerHTML = `
            <div style="margin-top: 40px;">
              <h3 style="color: var(--color-gold-primary); font-weight: 800; margin-bottom: 20px; border-right: 3px solid var(--color-gold-primary); padding-right: 12px; font-size:1.15rem;"><i class="fa-solid fa-link"></i> الصفحات الداخلية المتفرعة</h3>
              <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                ${subPages.map(sub => `
                  <a href="custom.html?id=${sub.id}" style="text-decoration: none; display: flex; align-items: center; gap: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(201, 162, 39, 0.15); padding: 20px; border-radius: 16px; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 4px 20px rgba(0,0,0,0.15);" onmouseover="this.style.transform='translateY(-4px)'; this.style.borderColor='rgba(201,162,39,0.5)'; this.style.boxShadow='0 8px 30px rgba(201,162,39,0.15)';" onmouseout="this.style.transform=''; this.style.borderColor='rgba(201, 162, 39, 0.15)'; this.style.boxShadow='0 4px 20px rgba(0,0,0,0.15)';">
                    <div style="font-size: 2.2rem; background: rgba(201, 162, 39, 0.08); border: 1px solid rgba(201, 162, 39, 0.15); width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">${sub.emoji || '📄'}</div>
                    <div>
                      <h4 style="color: #fff; font-weight: 700; margin: 0 0 4px 0; font-size: 1.05rem;">${sub.title}</h4>
                      <span style="font-size: 0.78rem; color: var(--color-gold-primary); font-weight: 600;">تصفح المحتوى الميداني ➔</span>
                    </div>
                  </a>
                `).join('')}
              </div>
            </div>
          `;
        }
      }
    } else {
      document.title = `الصفحة غير موجودة | الأمن العام`;
      container.innerHTML = `
        <div class="page-content-wrapper" style="margin-top:100px">
          <div class="page-body-card error-card">
            <div class="error-emoji"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="error-title">الصفحة غير موجودة</div>
            <div class="error-desc">عذراً، لم نتمكن من العثور على الصفحة المطلوبة أو تم حذفها بواسطة الإدارة.</div>
            <a href="../index.html" class="btn btn-gold"><i class="fa-solid fa-house"></i> العودة للصفحة الرئيسية</a>
          </div>
        </div>
      `;
    }
  });
</script>
</body>
</html>
