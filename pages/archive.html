<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أرشيف الاختبارات | الأمن العام</title>
  <!-- Premium Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <!-- DataTables CSS (dark theme) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-dt@2.0.7/css/dataTables.dataTables.min.css">
  
  <link rel="stylesheet" href="../assets/css/main.css?v=1.1.20">
  <link rel="stylesheet" href="../assets/css/navbar.css?v=1.1.20">
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=1.1.20">
  <link rel="stylesheet" href="../assets/css/footer.css">
  
  <style>
    body {
      font-family: 'Outfit', 'Cairo', 'Tajawal', sans-serif;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      background: var(--color-bg-primary);
    }
    input, textarea, select {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
    }
    .datatable-wrapper {
      margin: 2rem 0; 
      background: rgba(13, 24, 64, 0.35); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(201, 162, 39, 0.15);
      border-radius: 20px; 
      padding: 1.5rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }
    table.dataTable tbody tr {background: rgba(6, 13, 33, 0.45); color: var(--color-text-secondary);} 
    table.dataTable thead th {
      background: rgba(13, 24, 64, 0.6); 
      color: var(--color-gold-primary) !important;
      font-weight: 800;
      border-bottom: 1px solid rgba(201, 162, 39, 0.15) !important;
    }
    table.dataTable tbody tr:hover {
      background: rgba(201, 162, 39, 0.05) !important;
    }
    .dataTables_wrapper .dataTables_filter input {
      border-radius: 8px; 
      background: rgba(10, 18, 50, 0.5); 
      color: #fff; 
      border: 1px solid rgba(201, 162, 39, 0.25);
      padding: 6px 12px;
      outline: none;
    }
    .dataTables_wrapper .dataTables_filter input:focus {
      border-color: var(--color-gold-primary);
    }
    .dataTables_wrapper .dataTables_length select {
      border-radius: 8px; 
      background: rgba(10, 18, 50, 0.5); 
      color: #fff; 
      border: 1px solid rgba(201, 162, 39, 0.25);
      padding: 6px;
      outline: none;
    }
    .dataTables_wrapper .dataTables_info, 
    .dataTables_wrapper .dataTables_paginate {
      color: var(--color-text-secondary) !important;
      margin-top: 15px;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      color: var(--color-text-secondary) !important;
      border-radius: 8px !important;
      border: 1px solid transparent !important;
      background: transparent !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current, 
    .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
      background: rgba(201, 162, 39, 0.15) !important;
      border-color: rgba(201, 162, 39, 0.3) !important;
      color: var(--color-gold-primary) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: rgba(255, 255, 255, 0.05) !important;
      color: #fff !important;
    }
  </style>
</head>
<body>
  
  <div id="toast-container"></div>

  <!-- Header Section -->
  <div class="leadership-header-section" style="padding: 115px 0 20px;">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html">الرئيسية</a>
        <span class="breadcrumb-separator">/</span>
        <span style="color:var(--color-gold-primary)">أرشيف الاختبارات</span>
      </div>
    </div>
  </div>

  <div class="container page-wrapper" style="margin-bottom: 80px;">
    <div class="datatable-wrapper">
      <table id="examArchive" class="display" style="width:100%">
        <thead>
          <tr>
            <th>الاسم</th>
            <th>الرتبة</th>
            <th>الكود</th>
            <th>اسم الدورة</th>
            <th>تاريخ البدء</th>
            <th>تاريخ الانتهاء</th>
            <th>الدرجة</th>
            <th>الحالة</th>
            <th>اسم المختبر</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.0.7/js/jquery.dataTables.min.js"></script>
  <script src="../assets/js/storage.js?v=1.1.25"></script>
  <script src="../assets/js/data.js?v=1.1.20"></script>
  <script src="../assets/js/auth.js?v=1.1.20"></script>
  <script src="../assets/js/components.js?v=1.1.25"></script>
  <script src="../assets/js/app.js?v=1.1.20"></script>
  
  <script>
    // Inject navbar and sidebar
    document.write(Components.navbar('archive'));
    document.write(Components.sidebar('archive'));

    // Initialize DataTable after fetching data
    $(document).ready(function(){
      // Inject Footer
      const body = document.body;
      const footerDiv = document.createElement('div');
      footerDiv.innerHTML = Components.footer();
      body.appendChild(footerDiv.firstElementChild);

      // Verify Auth Gate
      if (!Auth.requireDiscordAuth()) {
        const mainContent = document.querySelector('.page-wrapper');
        if (mainContent) mainContent.style.display = 'none';
        return;
      }

      // Check role/rank authorization (archive requires admin/owner/assistant_owner)
      const user = Auth.getCurrentUser();
      const isAuthorized = user && ['owner', 'assistant_owner', 'admin'].includes(user.role);
      if (!isAuthorized) {
        const mainContent = document.querySelector('.page-wrapper');
        if (mainContent) {
          mainContent.innerHTML = `
            <div style="background: rgba(10, 18, 50, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 20px; padding: 40px 30px; text-align: center; max-width: 500px; margin: 40px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(231, 76, 60, 0.1);">
              <div style="width: 80px; height: 80px; background: rgba(231, 76, 60, 0.1); border: 2px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #e74c3c; margin: 0 auto 20px;">
                <i class="fa-solid fa-ban"></i>
              </div>
              <h2 style="font-size: 1.6rem; font-weight: 900; margin-bottom: 12px; color: #fff; font-family: inherit;">عذراً، لا تملك الصلاحية للوصول</h2>
              <p style="font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 30px; font-family: inherit;">تم تقييد الوصول لصفحة أرشيف الاختبارات العسكرية من قبل الإدارة. يرجى مراجعة قيادة الأمن العام.</p>
              <a href="../index.html" style="background: linear-gradient(135deg, #c9a227, #8a6d0f); color: #000; padding: 12px 30px; border-radius: 8px; font-weight: 800; font-size: 0.95rem; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; font-family: inherit;">
                <i class="fa-solid fa-house"></i> العودة للرئيسية
              </a>
            </div>
          `;
        }
        return;
      }

      Storage.fetchExamArchive().then(function(exams){
        const rows = exams.map(e => [
          e.trainee_name || e.name,
          e.rank,
          e.code,
          e.course_name || e.course,
          e.start_time,
          e.end_time,
          e.score,
          e.status,
          e.examiner || e.examiner_name
        ]);
        $('#examArchive').DataTable({
          data: rows,
          language: {
            url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/ar.json'
          },
          pageLength: 25,
          order: [[4, 'desc']]
        });
      }).catch(err=>{
        console.error('Failed to load exam archive', err);
      });
    });
  </script>
</body>
</html>
