<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معالجة تسجيل الدخول الموحد | الأمن العام</title>
  
  <link rel="stylesheet" href="../../../assets/css/main.css?v=1.1.7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Tajawal', 'Cairo', sans-serif;
      background: radial-gradient(circle at center, #0c163b 0%, #05091e 100%);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      direction: rtl;
    }

    .callback-card {
      background: rgba(13, 24, 64, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(92, 146, 232, 0.25);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(92, 146, 232, 0.05);
      position: relative;
      animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .callback-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 3px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
    }

    .spinner-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border: 4px solid rgba(201, 162, 39, 0.1);
      border-radius: 50%;
      border-top-color: #c9a227;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }

    .callback-desc {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn-callback-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #c9a227, #8a6d0f);
      color: #05091e;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      margin-top: 15px;
      display: none; /* Hidden by default, shown on timeout error */
    }

    .btn-callback-home:hover {
      box-shadow: 0 5px 15px rgba(201, 162, 39, 0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <script>
    (function() {
      window.diagnosticLogs = [];
      function logToScreen(msg, color = '#00ff00') {
        window.diagnosticLogs.push({ msg, color });
        const container = document.getElementById('diagnostic-log');
        if (container) {
          const div = document.createElement('div');
          div.style.color = color;
          div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
          div.style.padding = '4px 0';
          div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
          container.appendChild(div);
          container.scrollTop = container.scrollHeight;
        }
      }
      
      const orgLog = console.log;
      console.log = function(...args) {
        orgLog.apply(console, args);
        logToScreen(args.join(' '));
      };
      
      const orgWarn = console.warn;
      console.warn = function(...args) {
        orgWarn.apply(console, args);
        logToScreen(args.join(' '), '#ffaa00');
      };

      const orgErr = console.error;
      console.error = function(...args) {
        orgErr.apply(console, args);
        logToScreen(args.join(' '), '#ff5555');
      };

      window.onerror = function(message, source, lineno, colno, error) {
        logToScreen(`Global Error: ${message} at ${source}:${lineno}`, '#ff3333');
        return false;
      };
      
      window.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('diagnostic-log');
        if (container) {
          window.diagnosticLogs.forEach(item => {
            const div = document.createElement('div');
            div.style.color = item.color;
            div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
            div.style.padding = '4px 0';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${item.msg}`;
            container.appendChild(div);
          });
          container.scrollTop = container.scrollHeight;
        }
      });
    })();
  </script>

  <div class="callback-card">
    <div class="spinner-wrap">
      <div class="spinner" id="loading-spinner"></div>
    </div>
    <h2 class="callback-title" id="status-title"><i class="fa-solid fa-lock"></i> مصادقة الدخول الموحد</h2>
    <p class="callback-desc" id="status-desc">جاري معالجة التحقق الموحد والاتصال بالخادم الرئيسي للأمن العام...</p>
    
    <div id="diagnostic-log" style="margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.7); border: 1px solid rgba(201, 162, 39, 0.3); border-radius: 12px; font-family: monospace; font-size: 0.72rem; color: #00ff00; text-align: left; max-height: 180px; overflow-y: auto; direction: ltr; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);">
      <div style="color: #5c92e8; font-weight: bold; margin-bottom: 6px; border-bottom: 1px dashed rgba(92, 146, 232, 0.4); padding-bottom: 4px;">🔍 DIAGNOSTIC LOGS</div>
    </div>

    <a href="../../../index.html" class="btn-callback-home" id="home-btn"><i class="fa-solid fa-house"></i> العودة للرئيسية</a>
  </div>

  <div id="toast-container"></div>

  <script src="../../../assets/js/storage.js?v=1.1.7"></script>
  <script src="../../../assets/js/data.js?v=1.1.7"></script>
  <script src="../../../assets/js/auth.js?v=1.1.7"></script>
  <script src="../../../assets/js/app.js?v=1.1.7"></script>
  
  <script>
    // Safe fallback timeout: if redirect or login hasn't succeeded in 4.5 seconds
    setTimeout(() => {
      const statusTitle = document.getElementById('status-title');
      const statusDesc = document.getElementById('status-desc');
      const homeBtn = document.getElementById('home-btn');
      const spinner = document.getElementById('loading-spinner');
      
      if (!Auth.isLoggedIn()) {
        if (spinner) spinner.style.borderTopColor = '#e74c3c';
        statusTitle.textContent = '⚠️ تنبيه: انتهت مهلة المصادقة';
        statusDesc.textContent = 'لم نتمكن من إتمام عملية المصادقة الرقمية مع ديسكورد تلقائياً. يرجى التأكد من اتصالك ومحاولة تسجيل الدخول مرة أخرى.';
        if (homeBtn) homeBtn.style.display = 'inline-flex';
      }
    }, 4500);
  </script>
</body>
</html>
