<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة التحكم الإداري | الأمن العام</title>
  
  <link rel="stylesheet" href="../../assets/css/main.css?v=1.1.27">
  <link rel="stylesheet" href="../../assets/css/admin.css?v=1.1.27">
  <script src="../../assets/js/storage.js?v=1.1.30"></script>
  <script src="../../assets/js/data.js?v=1.1.27"></script>
  <script src="../../assets/js/auth.js?v=1.1.30"></script>
  <script src="../../assets/js/app.js?v=1.1.31"></script>
  <script>
    // Synchronous route guard for login page
    if (Auth.isLoggedIn()) {
      if (['owner', 'assistant_owner', 'admin'].includes(Auth.getRole())) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = '../../index.html';
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Orbitron:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Tajawal', 'Cairo', sans-serif;
    }
    
    .login-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0c163b 0%, #05091e 100%);
      overflow: hidden;
      padding: 20px;
    }
    
    /* Premium glassmorphism card */
    .login-glass-card {
      background: rgba(13, 24, 64, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(92, 146, 232, 0.25);
      border-radius: 24px;
      padding: 40px 30px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(92, 146, 232, 0.05);
      z-index: 10;
      animation: scaleIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    
    .login-logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 15px rgba(92,146,232,0.4));
    }

    .form-group-custom {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group-custom label {
      display: block;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .form-input-custom {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .form-input-custom:focus {
      outline: none;
      border-color: var(--color-gold-primary);
      background: rgba(92, 146, 232, 0.04);
      box-shadow: 0 0 15px rgba(92, 146, 232, 0.15);
    }

    .btn-login-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--color-gold-primary), var(--color-gold-dark));
      color: #05091e;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      font-family: inherit;
    }

    .btn-login-submit:hover {
      box-shadow: 0 5px 20px rgba(92, 146, 232, 0.4);
      transform: translateY(-1px);
    }

    .separator-text {
      text-align: center;
      margin: 25px 0;
      position: relative;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .separator-text::before,
    .separator-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .separator-text::before { left: 0; }
    .separator-text::after { right: 0; }

    .btn-login-discord {
      width: 100%;
      background: #5865F2;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
      text-decoration: none;
      box-sizing: border-box;
    }

    .btn-login-discord:hover {
      background: #4752c4;
      box-shadow: 0 5px 20px rgba(88, 101, 242, 0.35);
      transform: translateY(-1px);
    }

    .btn-login-google {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      font-family: inherit;
    }

    .btn-login-google:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 0.8rem;
      margin-top: 25px;
      transition: color 0.3s;
    }

    .back-home:hover {
      color: var(--color-gold-primary);
    }

    /* Google Modal Simulator */
    .google-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .google-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .google-card {
      background: #ffffff;
      color: #202124;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      padding: 36px 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      font-family: 'Roboto', 'Arial', sans-serif;
      text-align: right;
      direction: rtl;
    }

    .google-logo-svg {
      width: 74px;
      margin: 0 auto 20px;
      display: block;
    }

    .google-title {
      font-size: 1.3rem;
      font-weight: 500;
      margin: 0 0 8px;
      color: #202124;
      text-align: center;
    }

    .google-subtitle {
      font-size: 0.92rem;
      color: #5f6368;
      margin: 0 0 24px;
      text-align: center;
    }

    .google-account-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }

    .google-account-item:hover {
      background: #f8f9fa;
    }

    .google-avatar-circle {
      width: 38px;
      height: 38px;
      background: #c9a227;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .google-account-details {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .google-account-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #3c4043;
    }

    .google-account-email {
      font-size: 0.78rem;
      color: #5f6368;
    }

    .google-loader {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .google-spinner {
      width: 45px;
      height: 45px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4285F4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-glass-card">
    <div class="login-logo">
      <img src="../../assets/img/emblem.png" alt="شعار الأمن العام" class="login-logo-img" onerror="this.outerHTML='<i class=\'fa-solid fa-shield-halved\'></i>'">
      <h1 class="login-title">بوابة الإدارة العامة</h1>
      <p class="login-subtitle">تسجيل الدخول للوصول للوحة التحكم والعمليات</p>
    </div>
    
    <form id="login-form">
      <div class="form-group-custom">
        <label for="username"><i class="fa-solid fa-user"></i> اسم المستخدم</label>
        <input type="text" id="username" class="form-input-custom" placeholder="أدخل اسم المستخدم" required>
      </div>
      
      <div class="form-group-custom">
        <label for="password"><i class="fa-solid fa-lock"></i> كلمة المرور</label>
        <input type="password" id="password" class="form-input-custom" placeholder="أدخل كلمة المرور" required>
      </div>
      
      <button type="submit" class="btn-login-submit"><i class="fa-solid fa-key"></i> دخول آمن</button>
    </form>
    
    <div class="separator-text">أو طرق المصادقة الرقمية</div>
    
    <button type="button" id="discord-auth-btn" class="btn-login-discord" style="border: none; font-family: inherit;">
      <svg class="discord-icon-svg" style="width:20px; height:20px; fill:currentColor;" viewBox="0 0 127.14 96.36">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c.78-.57,1.53-1.18,2.24-1.81a75.46,75.46,0,0,0,73.5,0c.71.63,1.46,1.24,2.24,1.81a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.82,49.25,123.63,26.47,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
      </svg>
      <span>تسجيل الدخول باستخدام Discord</span>
    </button>
    
    <button type="button" class="btn-login-google" onclick="openGoogleAccountChooser()">
      <span style="font-size:1.2rem;"><i class="fa-solid fa-envelope"></i></span>
      <span>مصادقة بريد Google المعتمد</span>
    </button>
    
    <a href="../../index.html" class="back-home">
      <span><i class="fa-solid fa-house"></i></span> العودة للبوابة الرئيسية
    </a>
  </div>
</div>

<!-- Google Account Picker Overlay -->
<div id="google-modal-overlay" class="google-modal-overlay" onclick="if(event.target === this) closeGoogleAccountChooser()">
  <div class="google-card">
    <svg class="google-logo-svg" viewBox="0 0 24 24" width="74" height="24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    
    <div id="google-accounts-picker">
      <h2 class="google-title">اختيار حساب</h2>
      <p class="google-subtitle">للمتابعة إلى بوابة الأمن العام</p>
      
      <div class="google-account-item" onclick="selectGoogleAccount('poliesal90@gmail.com')">
        <div class="google-avatar-circle"><i class="fa-solid fa-crown"></i></div>
        <div class="google-account-details">
          <span class="google-account-name">المدير العام (المالك)</span>
          <span class="google-account-email">poliesal90@gmail.com</span>
        </div>
      </div>
      
      <div class="google-account-item" onclick="selectGoogleAccount('anonymous@gmail.com')">
        <div class="google-avatar-circle" style="background:#5f6368"><i class="fa-solid fa-user"></i></div>
        <div class="google-account-details">
          <span class="google-account-name">عضو مجهول</span>
          <span class="google-account-email">anonymous@gmail.com</span>
        </div>
      </div>
    </div>
    
    <div id="google-loader" class="google-loader">
      <div class="google-spinner"></div>
      <p style="margin-top:20px; font-weight:700; color:#5f6368; font-size:0.9rem; text-align:center;">جاري التحقق من أوراق المصادقة والتأمين...</p>
    </div>
  </div>
</div>

<div id="toast-container"></div>



<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Seed initial app data if needed
    SeedData.init();
    
    // If user is already logged in, redirect appropriately
    if (Auth.isLoggedIn()) {
      if (['owner', 'assistant_owner', 'admin'].includes(Auth.getRole())) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = '../../index.html';
      }
      return;
    }
    
    const btn = document.getElementById('discord-auth-btn');
    if (btn) {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        // Redirect back to dashboard after successful login
        let dest = window.location.href;
        if (dest.includes('login.html')) {
          dest = dest.replace('login.html', 'dashboard.html');
        } else {
          dest = 'pages/admin/dashboard.html';
        }
        localStorage.setItem('auth_redirect_back', dest);
        window.location.href = Auth.getDiscordAuthUrl();
      });
    }

    // Handle traditional login form
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const usernameVal = document.getElementById('username').value.trim();
      const passwordVal = document.getElementById('password').value;
      
      if (!usernameVal || !passwordVal) {
        App.toast('يرجى ملء جميع الحقول المطلوبة', 'warning');
        return;
      }
      
      const res = Auth.login(usernameVal, passwordVal);
      
      if (res.success) {
        App.toast(`أهلاً بك مجدداً، ${res.user.username} <i class="fa-solid fa-shield-halved"></i>`, 'success');
        
        setTimeout(() => {
          if (['owner', 'assistant_owner', 'admin'].includes(res.user.role)) {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = '../../index.html';
          }
        }, 1200);
      } else {
        App.toast(res.message || 'خطأ في المصادقة', 'error');
      }
    });
  });

  /* ───────────────────────────────────────────────────
     GOOGLE AUTH SIMULATOR
     ─────────────────────────────────────────────────── */
  function openGoogleAccountChooser() {
    document.getElementById('google-accounts-picker').style.display = 'block';
    document.getElementById('google-loader').style.display = 'none';
    document.getElementById('google-modal-overlay').classList.add('active');
  }

  function closeGoogleAccountChooser() {
    document.getElementById('google-modal-overlay').classList.remove('active');
  }

  function selectGoogleAccount(email) {
    // Show Loading
    document.getElementById('google-accounts-picker').style.display = 'none';
    document.getElementById('google-loader').style.display = 'flex';
    
    setTimeout(() => {
      if (email === 'poliesal90@gmail.com') {
        // Authenticate as owner
        const ownerUser = {
          id: 'user_owner_001',
          username: 'المدير العام',
          discord: 'poliesal90@gmail.com',
          role: 'owner',
          rank: 'مدير عام',
          avatar: '<i class="fa-solid fa-crown"></i>',
          status: 'active',
          joinDate: '2024-01-01',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        
        // Save current user session
        Storage.set(Storage.keys.CURRENT_USER, ownerUser);
        
        // Toast and Redirect
        App.toast('تمت المصادقة الثنائية بنجاح عبر بريد Google المعتمد! <i class="fa-solid fa-shield-halved"></i>', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        // Access Denied
        closeGoogleAccountChooser();
        App.toast('عذراً، هذا الحساب ليس لديه صلاحيات للوصول إلى لوحة التحكم!', 'error');
      }
    }, 1800);
  }
</script>
</body>
</html>
