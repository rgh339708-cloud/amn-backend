<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث ورفع الموقع الإلكتروني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-bg: #05091e;
            --color-card: rgba(10, 18, 50, 0.45);
            --color-gold: #c9a227;
            --color-gold-hover: #e5b92e;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.6);
            --color-success: #2ecc71;
            --color-error: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 30% 30%, rgba(88, 101, 242, 0.1) 0%, transparent 60%),
                        radial-gradient(circle at 70% 75%, rgba(201, 162, 39, 0.05) 0%, transparent 50%),
                        var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(201, 162, 39, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(201, 162, 39, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            background: var(--color-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4),
                        0 0 30px rgba(201, 162, 39, 0.05);
            position: relative;
            z-index: 2;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .icon-main {
            font-size: 3.5rem;
            color: var(--color-gold);
            text-shadow: 0 0 15px rgba(201, 162, 39, 0.4);
            z-index: 2;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 0.95rem;
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            direction: rtl;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--color-text-muted);
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background-color: var(--color-gold);
            box-shadow: 0 0 8px var(--color-gold);
        }

        .status-dot.success {
            background-color: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
        }

        .status-dot.error {
            background-color: var(--color-error);
            box-shadow: 0 0 8px var(--color-error);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 162, 39, 0.1);
            border-radius: 50%;
            border-top-color: var(--color-gold);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(-360deg); }
        }

        .btn {
            background: linear-gradient(135deg, var(--color-gold), #8a6d0f);
            color: var(--color-bg) !important;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(201, 162, 39, 0.25);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201, 162, 39, 0.4);
            background: linear-gradient(135deg, var(--color-gold-hover), var(--color-gold));
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <div class="icon-bg"></div>
            <i class="fa-solid fa-cloud-arrow-up icon-main" id="status-icon"></i>
        </div>
        
        <h1 id="title-text">تحديث ورفع ملفات الموقع</h1>
        <p id="desc-text">يتم الآن إرسال طلب تحديث الإعدادات والرفع التلقائي للسيرفر المحلي لتجاوز قيود أمان بيئة التطوير.</p>

        <div class="spinner" id="spinner-loader"></div>

        <div class="status-card">
            <div class="status-item">
                <div class="status-dot active" id="dot-1"></div>
                <span id="text-1">الاتصال بالسيرفر المحلي (Local Server)...</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="dot-2"></div>
                <span id="text-2">تحديث إعدادات الموقع...</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="dot-3"></div>
                <span id="text-3">تشغيل أمر الرفع إلى Surge في الخلفية...</span>
            </div>
        </div>

        <div style="display: none;" id="action-wrapper">
            <button class="btn" onclick="triggerDeploy()"><i class="fa-solid fa-rotate"></i> إعادة المحاولة</button>
        </div>

        <div class="footer">
            <i class="fa-solid fa-shield-halved"></i> نظام الرفع الذاتي للأمن العام • مدينة الـ 90
        </div>
    </div>

    <script>
        function updateDot(id, state) {
            const dot = document.getElementById('dot-' + id);
            dot.className = 'status-dot';
            if (state === 'active') dot.classList.add('active');
            else if (state === 'success') dot.classList.add('success');
            else if (state === 'error') dot.classList.add('error');
        }

        function triggerDeploy() {
            document.getElementById('spinner-loader').style.display = 'inline-block';
            document.getElementById('action-wrapper').style.display = 'none';
            document.getElementById('status-icon').className = 'fa-solid fa-cloud-arrow-up icon-main';
            document.getElementById('status-icon').style.color = 'var(--color-gold)';
            document.getElementById('status-icon').style.textShadow = '0 0 15px rgba(201, 162, 39, 0.4)';
            document.getElementById('title-text').innerText = 'تحديث ورفع ملفات الموقع';
            document.getElementById('desc-text').innerText = 'يتم الآن إرسال طلب تحديث الإعدادات والرفع التلقائي للسيرفر المحلي لتجاوز قيود أمان بيئة التطوير.';

            updateDot(1, 'active');
            updateDot(2, '');
            updateDot(3, '');

            // Step 1 & 2: POST request to local server
            fetch('/api/settings', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "trigger_deploy_now": Date.now()
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('استجابة السيرفر غير صحيحة: ' + res.statusText);
                return res.json();
            })
            .then(data => {
                updateDot(1, 'success');
                updateDot(2, 'success');
                updateDot(3, 'active');
                document.getElementById('text-2').innerText = 'تم تحديث الإعدادات على القرص بنجاح ✅';

                // Step 3: Wait for Surge execution
                setTimeout(() => {
                    updateDot(3, 'success');
                    document.getElementById('text-3').innerText = 'تم إطلاق أمر Surge بنجاح في الخلفية ✅';
                    document.getElementById('spinner-loader').style.display = 'none';
                    document.getElementById('status-icon').className = 'fa-solid fa-circle-check icon-main';
                    document.getElementById('status-icon').style.color = 'var(--color-success)';
                    document.getElementById('status-icon').style.textShadow = '0 0 15px rgba(46, 204, 113, 0.4)';
                    document.getElementById('title-text').innerText = 'تم التحديث والرفع بنجاح!';
                    document.getElementById('desc-text').innerHTML = 'تم رفع التحديثات وإصلاح مشكلة الربط بنجاح إلى الرابط الرسمي:<br><br><a href="https://amn-3-90.surge.sh/" target="_blank" style="color: var(--color-gold); text-decoration: underline; font-weight: bold;">https://amn-3-90.surge.sh</a>';
                }, 2000);
            })
            .catch(err => {
                updateDot(1, 'error');
                updateDot(2, 'error');
                updateDot(3, 'error');
                document.getElementById('spinner-loader').style.display = 'none';
                document.getElementById('action-wrapper').style.display = 'block';
                document.getElementById('status-icon').className = 'fa-solid fa-circle-exclamation icon-main';
                document.getElementById('status-icon').style.color = 'var(--color-error)';
                document.getElementById('status-icon').style.textShadow = '0 0 15px rgba(231, 76, 60, 0.4)';
                document.getElementById('title-text').innerText = 'فشل الاتصال بالسيرفر';
                document.getElementById('desc-text').innerText = 'لم نتمكن من الاتصال بالسيرفر المحلي (Local Server) على المنفذ 3000. تأكد من أن السيرفر يعمل بشكل صحيح.';
                console.error(err);
            });
        }

        // Auto trigger on load
        window.addEventListener('load', () => {
            setTimeout(triggerDeploy, 500);
        });
    </script>
</body>
</html>
